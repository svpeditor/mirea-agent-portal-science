id: science-agent
name: "Поиск научных статей"
version: "1.3.0"
category: "научная-работа"
icon: "🔬"
short_description: |
  По теме исследования спрашивает у DeepSeek-R1 список релевантных публикаций
  с краткими аннотациями и BibTeX. Источник — знания модели (агент работает
  в изолированной сети без доступа к публичному arXiv). DeepSeek-R1 — reasoning-
  модель, обычно отвечает 1-4 минуты — это нормально.

inputs:
  topic:
    type: textarea
    label: "Тема исследования"
    placeholder: "например, machine learning для медицинской диагностики"
    rows: 4
    required: true
  max_papers:
    type: number
    label: "Сколько статей"
    default: 15
    min: 5
    max: 30
  language:
    type: radio
    label: "Язык аннотаций"
    options:
      - { value: "ru", label: "Русский" }
      - { value: "en", label: "Английский" }
    default: "ru"
  model:
    type: radio
    label: "Модель"
    help: "R1 — reasoning-модель, отвечает 1-4 минуты но даёт более точные подборки. Haiku — быстро (10-30с) но проще."
    options:
      - { value: "deepseek/deepseek-r1", label: "DeepSeek-R1 (рекомендуется, 1-4 мин)" }
      - { value: "anthropic/claude-3.5-haiku", label: "Claude 3.5 Haiku (быстро, проще)" }
    default: "deepseek/deepseek-r1"

files: {}

outputs:
  - id: report
    type: docx
    label: "Отчёт по теме"
    filename: "report.docx"
    primary: true
  - id: bibtex
    type: any
    label: "BibTeX источников"
    filename: "sources.bib"

runtime:
  docker:
    base_image: "python:3.12-slim"
    setup:
      - "pip install -r requirements.txt"
    entrypoint: ["python", "agent.py"]
  limits:
    max_runtime_minutes: 30
    max_memory_mb: 512
    max_cpu_cores: 1
  llm:
    provider: openrouter
    models:
      - "deepseek/deepseek-r1"
      - "anthropic/claude-3.5-haiku"
