id: science-agent
name: "Поиск научных статей"
version: "1.2.0"
category: "научная-работа"
icon: "🔬"
short_description: |
  По теме исследования спрашивает у LLM список релевантных публикаций с краткими
  аннотациями и BibTeX. Источник — знания модели (агент работает в изолированной
  сети без доступа к публичному arXiv). Время ответа: 10-30с (Claude Haiku) или
  1-4 минуты (DeepSeek-R1, reasoning-модель).

inputs:
  topic:
    type: textarea
    label: "Тема исследования"
    placeholder: "например, machine learning для медицинской диагностики"
    rows: 4
    required: true
  max_papers:
    type: number
    label: "Сколько статей"
    default: 15
    min: 5
    max: 30
  language:
    type: radio
    label: "Язык аннотаций"
    options:
      - { value: "ru", label: "Русский" }
      - { value: "en", label: "Английский" }
    default: "ru"
  model:
    type: radio
    label: "Модель"
    help: "Haiku — быстрее (10-30с), R1 — рассуждает дольше но иногда точнее (1-4 мин)."
    options:
      - { value: "anthropic/claude-3.5-haiku", label: "Claude 3.5 Haiku (быстро)" }
      - { value: "deepseek/deepseek-r1", label: "DeepSeek-R1 (медленно)" }
    default: "anthropic/claude-3.5-haiku"

files: {}

outputs:
  - id: report
    type: docx
    label: "Отчёт по теме"
    filename: "report.docx"
    primary: true
  - id: bibtex
    type: any
    label: "BibTeX источников"
    filename: "sources.bib"

runtime:
  docker:
    base_image: "python:3.12-slim"
    setup:
      - "pip install -r requirements.txt"
    entrypoint: ["python", "agent.py"]
  limits:
    max_runtime_minutes: 30
    max_memory_mb: 512
    max_cpu_cores: 1
  llm:
    provider: openrouter
    models:
      - "deepseek/deepseek-r1"
      - "anthropic/claude-3.5-haiku"
