id: science-agent
name: "Поиск научных статей"
version: "4.0.0"
category: "научная-работа"
icon: "🔬"
short_description: |
  Ищет РЕАЛЬНЫЕ статьи по теме сразу в трёх базах (arXiv + Crossref +
  Semantic Scholar) через allowlist-прокси portal-api, дедуплицирует,
  ранжирует и аннотирует через DeepSeek-R1 строго по реальным abstract'ам.
  Для arXiv-статей прикладывает сам PDF-файл. Кликабельные ссылки + BibTeX.
  Crossref покрывает русско-/гуманитарные журналы (не только STEM).
  Агент НЕ выдумывает статьи: если реального ничего не нашлось — честно
  сообщает об этом, а не подменяет выдачу фантазией модели.

inputs:
  topic:
    type: textarea
    label: "Тема исследования"
    placeholder: "например, machine learning для медицинской диагностики"
    rows: 4
    required: true
  max_papers:
    type: number
    label: "Сколько статей"
    default: 15
    min: 5
    max: 30
  language:
    type: radio
    label: "Язык аннотаций"
    options:
      - { value: "ru", label: "Русский" }
      - { value: "en", label: "Английский" }
    default: "ru"
  source:
    type: radio
    label: "Источник публикаций"
    help: "Реальные базы — настоящие статьи (arXiv+Crossref+Semantic Scholar), с ссылками и PDF. Знания LLM — модель подбирает из памяти, статьи НЕ проверяются и могут быть выдуманы (только если реальный поиск не подошёл)."
    options:
      - { value: "real", label: "Реальные базы (рекомендуется)" }
      - { value: "llm", label: "Знания LLM (не проверено!)" }
    default: "real"
  sort_by:
    type: radio
    label: "Сортировка"
    options:
      - { value: "relevance", label: "По релевантности (LLM-балл)" }
      - { value: "popularity", label: "По цитированиям (Semantic Scholar)" }
    default: "relevance"
  model:
    type: radio
    label: "Модель для ранжирования и аннотаций"
    help: "R1 — reasoning-модель, отвечает 1-4 минуты но точнее. Haiku — быстро (10-30с)."
    options:
      - { value: "deepseek/deepseek-r1", label: "DeepSeek-R1 (рекомендуется, 1-4 мин)" }
      - { value: "anthropic/claude-3.5-haiku", label: "Claude 3.5 Haiku (быстро)" }
    default: "deepseek/deepseek-r1"

files: {}

outputs:
  - id: report
    type: docx
    label: "Отчёт по теме"
    filename: "report.docx"
    primary: true
  - id: bibtex
    type: any
    label: "BibTeX источников"
    filename: "sources.bib"

runtime:
  docker:
    base_image: "python:3.12-slim"
    setup:
      - "pip install -r requirements.txt"
    entrypoint: ["python", "agent.py"]
  limits:
    max_runtime_minutes: 30
    max_memory_mb: 512
    max_cpu_cores: 1
  llm:
    provider: openrouter
    models:
      - "deepseek/deepseek-r1"
      - "anthropic/claude-3.5-haiku"
