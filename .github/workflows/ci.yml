name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ruff + pytest
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
          pip install "portal-sdk @ git+https://github.com/svpeditor/mirea-agent-portal.git#subdirectory=packages/portal-sdk-python"

      - name: ruff
        run: ruff check agent.py tests || true

      - name: pytest
        run: pytest tests -q

  manifest:
    name: manifest validation
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install portal-sdk
        run: |
          python -m pip install --upgrade pip
          pip install "portal-sdk @ git+https://github.com/svpeditor/mirea-agent-portal.git#subdirectory=packages/portal-sdk-python"

      - name: Validate manifest.yaml
        run: |
          python -c "
          from portal_sdk.manifest import Manifest
          m = Manifest.from_yaml('manifest.yaml')
          print('OK:', m.id, m.version)
          "
